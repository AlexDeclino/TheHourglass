<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Hourglass</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Times New Roman', Times, serif;
      font-size: 16px;
      color: #2e2829;
      background: #fff;
      margin: 0;
      overflow: hidden;
    }

    /* Header — fixed to top */
    .header-section {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 680px;
      background: #fff;
      border-bottom: 1px solid #2e2829;
      padding: 0 2em;
      z-index: 10;
    }

    /* Snap scroll content area */
    .content-area {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 680px;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }

    .content-area::-webkit-scrollbar {
      display: none;
    }

    #entries p {
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 2em 2em 0;
      margin: 0;
      line-height: 24.1px;
      white-space: pre-wrap;
      text-indent: 0;
    }

    /* Input section — fixed to bottom */
    .input-section {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 680px;
      background: #fff;
      border-top: 1px solid #2e2829;
      padding: 1em 2em 1.5em;
      z-index: 10;
    }

    textarea {
      width: 100%;
      min-height: 80px;
      font-family: 'Times New Roman', Times, serif;
      font-size: 16px;
      color: #2e2829;
      border: 1px solid #ccc;
      padding: 0.75em 1em;
      resize: vertical;
      box-sizing: border-box;
      line-height: 24.1px;
      outline: none;
    }

    textarea:focus {
      border-color: #2e2829;
    }

    button {
      font-family: 'Times New Roman', Times, serif;
      font-size: 14px;
      color: #2e2829;
      background: none;
      border: 1px solid #2e2829;
      padding: 0.4em 1.2em;
      cursor: pointer;
    }

    button:hover {
      background: #2e2829;
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- Fixed header -->
  <div class="header-section" id="header">
    <img id="header-img" src="images/batch_path1_header_.png" alt="The Hourglass" style="height: 80px; display: block; margin: 0 auto;">
    <p id="header-word" style="text-align:center; text-indent:0; margin: 0.25em 0 0.5em; font-size:14px; letter-spacing:0.15em; min-height:1.2em;">GAMBLING</p>
  </div>

  <!-- Snap scroll content -->
  <div class="content-area" id="content-area">
    <div id="entries"></div>
  </div>

  <!-- Fixed input -->
  <div class="input-section" id="input-section">
    <textarea id="entry-input" placeholder="humans are wired for gambling..."></textarea>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:0.75em;">
      <button onclick="wipeEntries()" style="color:#999; border-color:#ccc;">Wipe all</button>
      <div style="display:flex; gap:0.5em; align-items:center;">
        <select id="username-select" style="font-family:'Times New Roman',serif; font-size:14px; color:#2e2829; border:1px solid #2e2829; padding:0.4em 0.5em; background:#fff; cursor:pointer; outline:none;">
          <option value="random">random</option>
        </select>
        <button onclick="submitEntry()">Submit</button>
      </div>
    </div>
  </div>

  <script>
    function adjustLayout() {
      const headerHeight = document.getElementById('header').offsetHeight;
      const inputHeight = document.getElementById('input-section').offsetHeight;
      const contentHeight = window.innerHeight - headerHeight - inputHeight;
      const area = document.getElementById('content-area');
      area.style.top = headerHeight + 'px';
      area.style.height = contentHeight + 'px';
      document.querySelectorAll('#entries p').forEach(p => {
        p.style.height = contentHeight + 'px';
      });
    }

    adjustLayout();
    window.addEventListener('resize', adjustLayout);

    var usernames = [];
    fetch('usernames2.txt').then(function(r){ return r.text(); }).then(function(t){
      usernames = t.split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
      const sel = document.getElementById('username-select');
      usernames.forEach(function(u) {
        const opt = document.createElement('option');
        opt.value = u;
        opt.textContent = u;
        sel.appendChild(opt);
      });
    });

    function getSelectedUsername() {
      const sel = document.getElementById('username-select');
      if (sel.value === 'random') {
        if (!usernames.length) return '';
        return usernames[Math.floor(Math.random() * usernames.length)];
      }
      return sel.value;
    }

    // Cycle header images
    const headerImages = [
      'images/batch_path1_header_.png',
      'images/batch_path2_header_.png',
      'images/batch_path3_header_.png',
      'images/batch_path4_header_.png',
      'images/batch_path5_header_.png',
      'images/batch_path6_header_.png',
      'images/batch_path7_header_.png',
      'images/batch_path8_header_.png',
      'images/batch_path9_header_.png',
      'images/batch_path10_header_.png',
      'images/batch_path11_header_.png',
      'images/batch_path12_header_.png',
      'images/batch_path13_header_.png',
      'images/batch_path14_header_.png',
      'images/batch_path15_header_.png',
      'images/batch_path16_header_.png',
      'images/batch_path17_header_.png',
      'images/batch_path18_header_.png',
      'images/batch_path19_header_.png',
    ];
    let headerIndex = 0;
    setInterval(function() {
      headerIndex = (headerIndex + 1) % headerImages.length;
      document.getElementById('header-img').src = headerImages[headerIndex];
    }, 50);

    // Word cycling animation
    const words = ['GAMBLING', 'CAPITAL', 'GAINZ', 'FLOW', 'PLEASURE'];
    let wordIndex = 0;
    const letterDelay = 80;

    function animateWord() {
      const el = document.getElementById('header-word');
      const current = words[wordIndex];
      const next = words[(wordIndex + 1) % words.length];

      let step = current.length;
      const remove = setInterval(function() {
        step--;
        el.textContent = current.slice(0, step);
        if (step <= 0) {
          clearInterval(remove);
          let add = 0;
          const build = setInterval(function() {
            add++;
            el.textContent = next.slice(0, add);
            if (add >= next.length) {
              clearInterval(build);
              wordIndex = (wordIndex + 1) % words.length;
            }
          }, letterDelay);
        }
      }, letterDelay);
    }

    setInterval(animateWord, 5000);
    new ResizeObserver(adjustLayout).observe(document.getElementById('input-section'));

    function makeStamp() {
      const now = new Date();
      const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
      function ordinal(n) {
        const s = ['th','st','nd','rd'], v = n % 100;
        return n + (s[(v - 20) % 10] || s[v] || s[0]);
      }
      const utc1 = now.getUTCHours() * 3600 + now.getUTCMinutes() * 60 + now.getUTCSeconds() + 3600;
      const beats = ((utc1 % 86400) / 86.4).toFixed(2);
      const year = now.getUTCFullYear() + 5;
      const u = getSelectedUsername();
      const mm = String(now.getUTCMonth() + 1).padStart(2, '0');
      const dd = String(now.getUTCDate()).padStart(2, '0');
      const dateLine = mm + '/' + dd + '/' + year + ' @ ' + String(Math.floor(beats)).padStart(3, '0') + '.' + beats.split('.')[1];
      const userLine = 'by ' + u;
      return { dateLine, userLine };
    }

    const stampStyle = 'color:#fff; padding:0 0.3em; font-size:0.85em; white-space:nowrap; display:inline-block;';

    function createEntry(html, stamp) {
      const contentHeight = parseInt(document.getElementById('content-area').style.height) || window.innerHeight;
      const p = document.createElement('p');
      p.style.height = contentHeight + 'px';
      if (stamp) {
        const dateSp = document.createElement('span');
        dateSp.textContent = stamp.dateLine;
        dateSp.style.cssText = stampStyle + ' background:#D9D9D9; color:#2e2829; margin-bottom:0.1em;';
        const userSp = document.createElement('span');
        userSp.textContent = stamp.userLine;
        userSp.style.cssText = stampStyle + ' background:#838383; margin-bottom:0.25em;';
        p.appendChild(dateSp);
        p.appendChild(document.createTextNode('\n'));
        p.appendChild(userSp);
        p.appendChild(document.createTextNode('\n' + html));
      } else {
        p.innerHTML = html;
      }
      return p;
    }

    function submitEntry() {
      const input = document.getElementById('entry-input');
      const text = input.value.trim();
      if (!text) return;
      const entries = document.getElementById('entries');
      const p = createEntry(text, makeStamp());
      entries.appendChild(p);
      input.value = '';
      saveEntries();
      adjustLayout();
      scrollToEntry(p);
    }

    document.getElementById('entry-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) submitEntry();
    });

    function scrollToEntry(p) {
      const area = document.getElementById('content-area');
      const index = Array.from(document.querySelectorAll('#entries p')).indexOf(p);
      area.scrollTop = index * area.offsetHeight;
    }

    function loadEntries() {
      const saved = JSON.parse(localStorage.getItem('hourglass-entries') || '[]');
      const entries = document.getElementById('entries');
      saved.forEach(function(html) {
        const p = createEntry(html);
        entries.appendChild(p);
      });
      adjustLayout();
      const last = entries.querySelector('p:last-child');
      if (last) scrollToEntry(last);
    }

    function wipeEntries() {
      if (!confirm('Wipe all entries?')) return;
      localStorage.removeItem('hourglass-entries');
      document.getElementById('entries').innerHTML = '';
    }

    function saveEntries() {
      const entries = document.getElementById('entries');
      const htmls = Array.from(entries.querySelectorAll('p')).map(p => p.innerHTML);
      localStorage.setItem('hourglass-entries', JSON.stringify(htmls));
    }

    loadEntries();
  </script>

</body>
</html>
