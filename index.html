<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Hourglass</title>
  <style>
    * { box-sizing: border-box; border-radius: 0 !important; }
    input, textarea, button { -webkit-appearance: none; appearance: none; }

    body {
      font-family: 'Times New Roman', Times, serif;
      font-size: 16px;
      color: #2e2829;
      background: #fff;
      margin: 0;
      overflow: hidden;
    }

    .header-section {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-bottom: 1px solid #2e2829;
      padding: 0 1em;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Single entry viewer */
    .content-area {
      position: fixed;
      left: 0;
      right: 0;
      overflow: hidden;
    }

    #entry-display {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 2em 2em 0;
      line-height: 24.1px;
      white-space: pre-wrap;
      text-indent: 0;
      scrollbar-width: none;
    }

    #entry-display::-webkit-scrollbar { display: none; }

    /* Nav arrows */
    .nav-arrows {
      position: fixed;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1em;
      padding: 0.4em 0;
      background: #fff;
      z-index: 9;
    }

    .nav-arrows button {
      background: none;
      border: none;
      font-size: 16px;
      padding: 0.2em 0.6em;
      cursor: pointer;
      color: #2e2829;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .nav-arrows button:hover { color: #000; }
    .nav-arrows button:active { color: #2e2829; }
    .nav-arrows button:disabled { opacity: 0.2; cursor: default; }

    @keyframes slide-from-below {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
    @keyframes slide-from-above {
      from { transform: translateY(-40px); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }
    .animate-from-below { animation: slide-from-below 0.25s ease-out; }
    .animate-from-above { animation: slide-from-above 0.25s ease-out; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-5px); }
      40%     { transform: translateX(5px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }
    .shake { animation: shake 0.3s ease-out; }

    .input-section {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 1px solid #2e2829;
      padding: 0.75em 1em 1em;
      z-index: 10;
    }

    textarea {
      width: 100%;
      min-height: 80px;
      font-family: 'Times New Roman', Times, serif;
      font-size: 16px;
      color: #2e2829;
      border: 1px solid #ccc;
      padding: 0.75em 1em;
      resize: vertical;
      line-height: 24.1px;
      outline: none;
    }

    textarea:focus { border-color: #2e2829; }

    button {
      font-family: 'Times New Roman', Times, serif;
      font-size: 14px;
      color: #2e2829;
      background: none;
      border: 1px solid #2e2829;
      padding: 0.4em 1.2em;
      cursor: pointer;
    }

    button:hover { background: #2e2829; color: #fff; }

    #flash {
      position: fixed;
      inset: 0;
      background: yellow;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }

    @keyframes flash-twice {
      0%   { opacity: 0; }
      15%  { opacity: 0.5; }
      30%  { opacity: 0; }
      45%  { opacity: 0.5; }
      60%  { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="header-section" id="header">
    <img id="header-img" src="images/batch_path1_header_.png" alt="The Hourglass" style="height: 80px; display: block; margin: 0 auto;">
    <p id="header-word" style="text-align:center; text-indent:0; margin: 0.25em 0 0.5em; font-size:14px; letter-spacing:0.15em; min-height:1.2em;">GAMBLING</p>
  </div>

  <div id="flash"></div>

  <div class="content-area" id="content-area">
    <div id="entry-display"></div>
  </div>

  <div class="nav-arrows" id="nav-arrows">
    <button id="btn-prev" onclick="navigate(-1)">▲</button>
    <button id="btn-next" onclick="navigate(1)">▼</button>
  </div>

  <div class="input-section" id="input-section">
    <textarea id="entry-input" placeholder="humans are wired for gambling..."></textarea>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:0.5em; gap:0.5em; flex-wrap:wrap;">
      <div style="display:flex; align-items:center; gap:0.4em; flex:1; min-width:0;">
        <label style="font-size:11px; color:#999; letter-spacing:0.1em; white-space:nowrap;">LOC</label>
        <select id="place-select" style="font-family:'Times New Roman',serif; font-size:13px; color:#2e2829; border:1px solid #2e2829; padding:0.3em 0.4em; background:#fff; cursor:pointer; outline:none; border-radius:0; min-width:0; flex:1;">
          <option value="random">random</option>
        </select>
        <label style="font-size:11px; color:#999; letter-spacing:0.1em; white-space:nowrap;">ID</label>
        <select id="username-select" style="font-family:'Times New Roman',serif; font-size:13px; color:#2e2829; border:1px solid #2e2829; padding:0.3em 0.4em; background:#fff; cursor:pointer; outline:none; border-radius:0; min-width:0; flex:1;">
          <option value="random">random</option>
        </select>
      </div>
      <div style="display:flex; gap:0.4em; align-items:center;">
        <button onclick="wipeEntries()" style="color:#999; border-color:#ccc; font-size:13px; padding:0.3em 0.8em;">Wipe</button>
        <button onclick="submitEntry()" style="font-size:13px; padding:0.3em 0.8em;">Submit</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, push, onValue, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    const app = initializeApp({
      apiKey: "AIzaSyBzrVz-U08jW_UeyLZDP93jiVOcOXq17eA",
      authDomain: "thehourglass-bf7c6.firebaseapp.com",
      databaseURL: "https://thehourglass-bf7c6-default-rtdb.firebaseio.com",
      projectId: "thehourglass-bf7c6",
      storageBucket: "thehourglass-bf7c6.firebasestorage.app",
      messagingSenderId: "303017296",
      appId: "1:303017296:web:3f3628a9ef9ab06119d055"
    });

    const db = getDatabase(app);
    const entriesRef = ref(db, 'entries');

    let allEntries = [];
    let currentIndex = 0;

    // Layout
    function adjustLayout() {
      const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      const headerHeight = document.getElementById('header').offsetHeight;
      const inputHeight = document.getElementById('input-section').offsetHeight;
      const navHeight = document.getElementById('nav-arrows').offsetHeight;
      const contentHeight = vh - headerHeight - inputHeight - navHeight;
      const area = document.getElementById('content-area');
      area.style.top = headerHeight + 'px';
      area.style.height = contentHeight + 'px';
      document.getElementById('entry-display').style.height = contentHeight + 'px';
      document.getElementById('nav-arrows').style.top = (headerHeight + contentHeight) + 'px';
    }

    adjustLayout();
    window.addEventListener('resize', adjustLayout);
    if (window.visualViewport) window.visualViewport.addEventListener('resize', adjustLayout);
    new ResizeObserver(adjustLayout).observe(document.getElementById('input-section'));

    // Places
    var places = [];
    fetch('places.txt').then(r => r.text()).then(t => {
      places = t.split('\n').map(l => {
        const parts = l.split('|');
        return parts.length >= 2 ? { mountain: parts[0].trim(), range: parts[1].trim() } : null;
      }).filter(Boolean);
      const sel = document.getElementById('place-select');
      places.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.mountain + ' (' + p.range + ')';
        opt.textContent = p.mountain;
        sel.appendChild(opt);
      });
    });

    function getSelectedPlace() {
      const sel = document.getElementById('place-select');
      if (sel.value === 'random') {
        if (!places.length) return '';
        const p = places[Math.floor(Math.random() * places.length)];
        return p.mountain + ' (' + p.range + ')';
      }
      return sel.value;
    }

    // Usernames
    var usernames = [];
    fetch('usernames2.txt').then(r => r.text()).then(t => {
      usernames = t.split('\n').map(l => l.trim()).filter(Boolean);
      const sel = document.getElementById('username-select');
      usernames.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u;
        opt.textContent = u;
        sel.appendChild(opt);
      });
    });

    function getSelectedUsername() {
      const sel = document.getElementById('username-select');
      if (sel.value === 'random') {
        if (!usernames.length) return '';
        return usernames[Math.floor(Math.random() * usernames.length)];
      }
      return sel.value;
    }

    // Header images
    const headerImages = [
      'images/batch_path1_header_.png','images/batch_path2_header_.png',
      'images/batch_path3_header_.png','images/batch_path4_header_.png',
      'images/batch_path5_header_.png','images/batch_path6_header_.png',
      'images/batch_path7_header_.png','images/batch_path8_header_.png',
      'images/batch_path9_header_.png','images/batch_path10_header_.png',
      'images/batch_path11_header_.png','images/batch_path12_header_.png',
      'images/batch_path13_header_.png','images/batch_path14_header_.png',
      'images/batch_path15_header_.png','images/batch_path16_header_.png',
      'images/batch_path17_header_.png','images/batch_path18_header_.png',
      'images/batch_path19_header_.png',
    ];
    let headerIndex = 0;
    setInterval(() => {
      headerIndex = (headerIndex + 1) % headerImages.length;
      document.getElementById('header-img').src = headerImages[headerIndex];
    }, 50);

    // Word animation
    let words = ['GAMBLING'];
    let wordIndex = 0;
    fetch('words.txt').then(r => r.text()).then(t => {
      words = t.split('\n').map(w => w.trim()).filter(Boolean);
    });
    const letterDelay = 80;
    function animateWord() {
      const el = document.getElementById('header-word');
      const current = words[wordIndex];
      const next = words[(wordIndex + 1) % words.length];
      let step = current.length;
      const remove_interval = setInterval(() => {
        step--;
        el.textContent = current.slice(0, step);
        if (step <= 0) {
          clearInterval(remove_interval);
          let add = 0;
          const build = setInterval(() => {
            add++;
            el.textContent = next.slice(0, add);
            if (add >= next.length) {
              clearInterval(build);
              wordIndex = (wordIndex + 1) % words.length;
            }
          }, letterDelay);
        }
      }, letterDelay);
    }
    setInterval(animateWord, 5000);

    // Stamp
    function makeStamp() {
      const now = new Date();
      const utc1 = now.getUTCHours() * 3600 + now.getUTCMinutes() * 60 + now.getUTCSeconds() + 3600;
      const beats = ((utc1 % 86400) / 86.4).toFixed(2);
      const mm = String(now.getUTCMonth() + 1).padStart(2, '0');
      const dd = String(now.getUTCDate()).padStart(2, '0');
      return {
        dateLine: mm + '/' + dd + '  @' + String(Math.floor(beats)).padStart(3, '0') + '.' + beats.split('.')[1] + ' | ' + getSelectedPlace(),
        userLine: 'by ' + getSelectedUsername()
      };
    }

    const stampStyle = 'color:#fff; padding:0 0.3em; font-size:0.85em; white-space:nowrap; display:inline-block;';

    function renderEntry(data, dir) {
      const display = document.getElementById('entry-display');
      display.scrollTop = 0;
      display.innerHTML = '';
      display.classList.remove('animate-from-below', 'animate-from-above');
      if (dir > 0) {
        display.classList.add('animate-from-below');
      } else if (dir < 0) {
        display.classList.add('animate-from-above');
      }
      void display.offsetHeight;
      if (!data) return;
      const dateSp = document.createElement('span');
      dateSp.textContent = data.dateLine;
      dateSp.style.cssText = stampStyle + ' background:#D9D9D9; color:#2e2829; margin-bottom:0.1em;';
      const userSp = document.createElement('span');
      userSp.textContent = data.userLine;
      userSp.style.cssText = stampStyle + ' background:#838383; margin-bottom:0.25em;';
      display.appendChild(dateSp);
      display.appendChild(document.createTextNode('\n'));
      display.appendChild(userSp);
      display.appendChild(document.createTextNode('\n' + data.text));
    }

    function updateNav() {
      document.getElementById('btn-prev').disabled = currentIndex <= 0;
      document.getElementById('btn-next').disabled = currentIndex >= allEntries.length - 1;
    }

    window.navigate = function(dir) {
      const next = Math.max(0, Math.min(allEntries.length - 1, currentIndex + dir));
      if (next === currentIndex) return;
      currentIndex = next;
      renderEntry(allEntries[currentIndex], dir);
      updateNav();
    };

    // Load & sync from Firebase
    let initialLoad = true;
    onValue(entriesRef, snapshot => {
      const val = snapshot.val();
      allEntries = val ? Object.values(val) : [];
      if (initialLoad) {
        currentIndex = allEntries.length - 1;
      } else {
        currentIndex = allEntries.length - 1;
        const flash = document.getElementById('flash');
        flash.style.animation = 'none';
        flash.offsetHeight;
        flash.style.animation = 'flash-twice 0.6s ease-out';
      }
      renderEntry(allEntries[currentIndex] || null);
      updateNav();
      initialLoad = false;
    });

    // Submit
    window.submitEntry = function() {
      const input = document.getElementById('entry-input');
      const text = input.value.trim();
      if (!text) return;
      const stamp = makeStamp();
      push(entriesRef, { text, dateLine: stamp.dateLine, userLine: stamp.userLine });
      input.value = '';
    };

    document.getElementById('entry-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) window.submitEntry();
    });

    document.getElementById('entry-input').addEventListener('input', () => {
      const ta = document.getElementById('entry-input');
      if (ta.value.length > 666) {
        ta.value = ta.value.slice(0, 666);
        ta.classList.remove('shake');
        void ta.offsetHeight;
        ta.classList.add('shake');
        const flash = document.getElementById('flash');
        flash.style.background = 'red';
        flash.style.animation = 'none';
        void flash.offsetHeight;
        flash.style.animation = 'flash-twice 0.4s ease-out';
        flash.addEventListener('animationend', () => { flash.style.background = 'yellow'; }, { once: true });
      }
    });

    // Wipe
    window.wipeEntries = function() {
      const pwd = prompt('Password:');
      if (pwd !== '666') return;
      if (!confirm('Wipe all entries?')) return;
      remove(entriesRef);
    };
  </script>

</body>
</html>
